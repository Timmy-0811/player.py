name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name Player player.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: player
          path: dist/player.exe

      - name: Build Debug EXE
        run: |
          pyinstaller --onefile --name Player-Debug player.py

      - name: Upload Debug EXE
        uses: actions/upload-artifact@v4
        with:
          name: player-debug
          path: dist/player-debug.exe

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          files: |
            dist/Player.exe
            dist/Player-Debug.exe
            player.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
