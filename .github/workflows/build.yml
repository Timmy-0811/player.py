name: Build on new Draft

permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    strategy:
      matrix:
        build: [release, debug]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build Release
        if: matrix.build == 'release'
        run: pyinstaller --onefile --noconsole --name Windows-Player player.py

      - name: Build Debug
        if: matrix.build == 'debug'
        run: pyinstaller --onefile --name Windows-Player-Debug player.py

      - name: Save
        if: matrix.build == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/win
          
      - name: Save
        if: matrix.build == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: dist/win

  build-mac-x64:
    runs-on: macos-latest

    strategy:
      matrix:
        build: [release, debug]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install dependencies
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 pip install pyinstaller -r requirements.txt

      - name: Build Release
        if: matrix.build == 'release'
        run: arch -x86_64 pyinstaller --onefile --windowed --name Mac-x64-Player player.py

      - name: Build Debug
        if: matrix.build == 'debug'
        run: arch -x86_64 pyinstaller --onefile --name Mac-x64-Player-Debug player.py

      - name: Save
        if: matrix.build == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/mac-x64
          
      - name: Save
        if: matrix.build == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: dist/mac-x64

  build-mac-arm:
    runs-on: macos-latest

    strategy:
      matrix:
        build: [release, debug]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build Release
        if: matrix.build == 'release'
        run: pyinstaller --onefile --windowed --name Mac-arm-Player player.py

      - name: Build Debug
        if: matrix.build == 'debug'
        run: pyinstaller --onefile --name Mac-arm-Player-Debug player.py

      - name: Save
        if: matrix.build == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/mac-arm
          
      - name: Save
        if: matrix.build == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: dist/mac-arm

  debug-zip:
    runs-on: ubuntu-latest
    needs: [build-win, build-mac-x64, build-mac-arm]
    if: success()
    
    steps:
      - name: Get Files
        uses: actions/download-artifact@v4

      - name: Make Zip
        run: |
          zip -j Debug-Pack.zip win/debug/Windows-Player-Debug.exe mac-x64/debug/Mac-x64-Player-Debug mac-arm/debug/Mac-arm-Player-Debug

      - name: Save
        uses: actions/upload-artifact@v4
        with:
          name: zip
          path: dist

  publish:
    runs-on: windows-latest
    needs: [build-win, build-mac-x64, build-mac-arm, debug-zip]
    if: success()

    steps:
      - uses: actions/checkout@v4
    
      - name: Get Files
        uses: actions/download-artifact@v4
    
      - name: Upload to Draft
        uses: softprops/action-gh-release@v2
        with:
          files: |
            win/build/Windows-Player.exe
            mac-x64/build/Mac-x64-Player
            mac-arm/build/Mac-arm-Player
            player.py
            zip/Debug-Pack.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
